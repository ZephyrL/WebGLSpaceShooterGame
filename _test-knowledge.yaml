# Test Knowledge: WebGL Spacecraft Shooting Game
# Auto-maintained by AI agent after each test session.
# Last updated: 2026-03-25

project:
  name: webgl-spacecraft-shooting-game
  path: webgl-spacecraft-shooting-game/
  entry: src/main.ts
  bundler: vite
  dev_command: "npm run dev"
  dev_url: "http://localhost:5173/"
  framework: three.js (r170)
  rendering: WebGL2 (OpenGL ES 3.0)
  test_output_dir: _test-results/   # gitignored, screenshots & logs

scenes:
  start:
    file: src/gameplay/startScene.ts
    type: 2D HTML overlay
    elements:
      - heading: "SPACECRAFT SHOOTER"
      - subtitle: "WebGL 3D Demo"
      - button: "START GAME"  # triggers transition to loading
      - button: "SETTINGS"    # placeholder
    triggers:
      - click START GAME button
      - press Space key
      - press Enter key

  loading:
    file: src/gameplay/loadingScene.ts
    type: 2D HTML overlay
    behavior: auto-transitions to battle after resources load
    user_interaction: none

  battle:
    file: src/gameplay/battleScene.ts
    type: 3D WebGL scene
    systems:
      - player (src/gameplay/player.ts)
      - enemies (src/gameplay/enemies.ts)
      - playerBullets (src/gameplay/playerBullets.ts)
      - enemyBullets (src/gameplay/enemyBullets.ts)
      - powerups (src/gameplay/powerups.ts)
      - waveManager (src/gameplay/waveManager.ts)
      - collisionManager (src/gameplay/collisionManager.ts)
      - hud (src/gameplay/hud.ts)
      - pauseMenu (src/gameplay/pauseMenu.ts)

  game_over:
    type: 2D HTML overlay (within battle scene)
    elements:
      - heading: "GAME OVER"
      - text: "Final Score: {score}"
      - button: "PLAY AGAIN"  # restarts battle

controls:
  keyboard:
    movement:
      - W / ArrowUp: move up
      - S / ArrowDown: move down
      - A / ArrowLeft: move left
      - D / ArrowRight: move right
    pause: Escape (edge-triggered, may not register via Playwright)
    start_game: Space or Enter (from start screen)
  mouse:
    drag: hold mouse button + move → player follows pointer (lerp-smoothed)
    priority: mouse/touch overrides keyboard when active
  firing: automatic (continuous, cooldown-based, no key needed)

hud:
  layout:
    top_left: "HP: ❤❤❤" (heart emojis, full=❤ empty=♡)
    top_left_below: Pause button "| |"
    top_center_left: Timer (MM:SS)
    top_center: Active power-up name + remaining duration
    top_right: "Score: {n}"
    center: Wave announcement (temporary, ~2s)

player:
  shape: blue triangle
  health: 3 HP
  invincibility: brief flash after taking damage
  speed: clamped to play area bounds
  fire_rate: cooldown-based automatic

enemies:
  shape: red squares (various sizes)
  behavior: spawn from top, move downward
  types: multiple (configured in src/config/enemyConfig.ts)

powerups:
  shape: colored circles/diamonds
  types_observed:
    - Damage Boost (red circle, multiplies bullet damage)
  behavior: spawn during waves, float through play area

waves:
  manager: src/gameplay/waveManager.ts
  config: src/config/waveConfig.ts
  progression: Wave 1 → 2 → 3 → ... (observed up to Wave 4)
  victory: all waves complete + no enemies remaining
  defeat: player HP reaches 0

dev_panel:
  present: true
  library: lil-gui v0.21.0
  location: right side overlay
  collapsible: true  # click arrow left of "Dev Panel" title
  collapsed_label: "▸ Dev Panel"
  file: src/dev/devPanel.ts
  config_file: src/dev/runtimeConfig.ts
  sections:
    - name: UI Controls
      controls:
        - "Show HUD (checkbox) — toggles HP, Score, Timer, Wave display"
        - "Debug Labels (checkbox) — BUG: non-functional, see bugs below"
    - name: Debug Actions
      controls:
        - "Trigger Bomb (button) — kills all enemies instantly"
        - "Cinematic Camera (checkbox) — switches to 3D perspective view"
        - "Cinematic Position (Pos X/Y/Z sliders)"
        - "Cinematic LookAt (Look X/Y/Z sliders)"
    - name: Time Control
      controls:
        - "Game Speed (dropdown) — Paused(0x), 0.25x, 0.33x, 0.5x, 1x, 1.5x, 2x, 3x"
    - name: Player Stats
      controls:
        - "Move Speed (slider, default: 12)"
        - "Fire Rate (slider, default: 5)"
        - "Starting Health (slider, default: 3, applies on restart)"
        - "Invincibility (slider, default: 1.5s)"
        - "Bullet Speed (slider, default: 25)"
        - "Bullet Damage (slider, default: 1)"
        - "Multi-Shot Offset (slider, default: 0.8)"
    - name: Enemy Stats
      controls:
        - "drone: Health:1, MoveSpeed:5, PointValue:100, FireRate:0"
        - "fighter: Health:2, MoveSpeed:4, PointValue:200, FireRate:1.2, SineAmp:4"
        - "bomber: Health:4, MoveSpeed:2.5, PointValue:500, FireRate:0.6, SpreadAngle:30"
        - "Enemy Bullet Speed (shared, default: 12)"
    - name: Wave Editor
      controls:
        - "10 default waves, each expandable with Entry sub-folders"
        - "+ Add Entry (button)"
        - "+ Add Wave (button)"
        - "🗑 Remove Entry (button)"
    - name: "Save / Load"
      controls:
        - "💾 Save Config — saves to localStorage key 'spaceshooter_dev_config'"
        - "🔄 Reset to Defaults — rebuilds panel with code defaults"
        - "Archive dropdown — shows saved versions (v1, v2, ...)"
        - "📂 Restore Archive — restores selected archive version"
        - "📤 Export JSON — downloads 'spaceshooter-config-{timestamp}.json'"
        - "📥 Import JSON — opens file picker (untestable via Playwright)"
  bugs:
    - id: devpanel-1
      title: "Time Control GUI desync after restart"
      severity: medium
      status: open
      description: >
        After PLAY AGAIN, timeControl.timeScale resets to 1.0 but dropdown
        still shows previous selection. speedProxy not re-synced.
    - id: devpanel-2
      title: "Debug Labels toggle non-functional"
      severity: medium
      status: open
      description: >
        DebugLabelSystem.enabled set once in constructor from
        getGameConfig().debug.showLabels (default: false). Never updated
        reactively. addLabel() returns early when !this.enabled.
      file: src/engine/placeholderFactory.ts
    - id: devpanel-3
      title: "Textbox interaction may break pause (intermittent)"
      severity: low
      status: unconfirmed
      description: >
        Observed once: fill + Enter on lil-gui textbox unpaused game.
        Could not reproduce on subsequent attempts.
  interaction_notes:
    - "lil-gui <select> uses text labels as option values (e.g. '⏸ Paused (0x)')"
    - "Playwright selectOption({ label: '...' }) works for dropdowns"
    - "After panel rebuild (Reset/Restore/Import), all element IDs change"
    - "Sliders are best manipulated via page.evaluate() not click/drag"
    - "Use dynamic element discovery, not hardcoded aria-labelledby IDs"

